<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Renaissance · Debug Console</title>
<style>
  /* ===== Reset & Variables ===== */
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg-0:#0a0e1a;--bg-1:#111827;--bg-2:#1a2234;--bg-3:#243049;
    --border:#2a3654;--border-light:#3b4f73;
    --text-1:#e8edf5;--text-2:#94a3c0;--text-3:#5b6d8a;
    --cyan:#00e5ff;--cyan-dim:#00e5ff33;--cyan-bg:#00e5ff0d;
    --green:#00e676;--green-dim:#00e67633;--green-bg:#00e6760d;
    --red:#ff5252;--red-dim:#ff525233;--red-bg:#ff52520d;
    --amber:#ffab40;--amber-dim:#ffab4033;
    --purple:#b388ff;--purple-dim:#b388ff33;
    --radius:8px;--radius-lg:12px;
    --glow-cyan:0 0 20px #00e5ff22;
    --font-mono:"SF Mono","Fira Code","JetBrains Mono",monospace;
  }
  body{font-family:-apple-system,"SF Pro Display","PingFang SC",sans-serif;background:var(--bg-0);color:var(--text-1);line-height:1.6;min-height:100vh}

  /* ===== Topbar ===== */
  .topbar{
    background:linear-gradient(180deg,var(--bg-1) 0%,var(--bg-0) 100%);
    border-bottom:1px solid var(--border);
    padding:0 32px;height:52px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:100;
    backdrop-filter:blur(12px);
  }
  .topbar-brand{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;letter-spacing:.5px}
  .topbar-brand .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
  .topbar-brand span{color:var(--text-3);font-weight:400;font-size:12px;margin-left:8px}
  .topbar-nav{display:flex;gap:24px}
  .topbar-nav a{font-size:12px;color:var(--text-3);text-decoration:none;font-weight:500;transition:color .15s}
  .topbar-nav a:hover,.topbar-nav a.active{color:var(--cyan)}
  .topbar-status{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--text-3)}
  .topbar-status .live{color:var(--green);font-weight:500}

  /* ===== Main Layout ===== */
  .main{max-width:1200px;margin:0 auto;padding:28px 32px 80px}

  /* ===== Control Panel ===== */
  .ctrl{
    background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);
    padding:20px 24px;margin-bottom:24px;
    display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;
  }
  .ctrl-group{display:flex;flex-direction:column;flex:1;min-width:180px}
  .ctrl-group label{font-size:11px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
  .ctrl-group select,.ctrl-group input{
    height:38px;border:1px solid var(--border);border-radius:6px;padding:0 12px;
    font-size:13px;color:var(--text-1);background:var(--bg-2);outline:none;transition:border .15s;
    font-family:inherit;
  }
  .ctrl-group select:focus,.ctrl-group input:focus{border-color:var(--cyan);box-shadow:0 0 0 2px var(--cyan-dim)}
  .ctrl-group select option{background:var(--bg-2);color:var(--text-1)}
  .btn-run{
    height:38px;padding:0 28px;border:1px solid var(--cyan);border-radius:6px;
    background:var(--cyan-bg);color:var(--cyan);font-size:13px;font-weight:600;
    cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.3px;
  }
  .btn-run:hover{background:var(--cyan-dim);box-shadow:var(--glow-cyan)}
  .btn-run:disabled{opacity:.4;cursor:default;box-shadow:none}
  .btn-orch{
    height:38px;padding:0 20px;border:1px solid var(--purple);border-radius:6px;
    background:var(--purple-dim);color:var(--purple);font-size:13px;font-weight:600;
    cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  .btn-orch:hover{box-shadow:0 0 20px #b388ff22}

  /* ===== Agent Info ===== */
  .agent-info{
    display:none;padding:12px 16px;background:var(--bg-1);border:1px solid var(--border);
    border-left:3px solid var(--cyan);border-radius:0 var(--radius) var(--radius) 0;
    margin-bottom:20px;font-size:12px;color:var(--text-2);line-height:1.7;
  }

  /* ===== Error ===== */
  .error-box{
    display:none;padding:12px 16px;background:var(--red-bg);border:1px solid var(--red-dim);
    border-left:3px solid var(--red);border-radius:0 var(--radius) var(--radius) 0;
    margin-bottom:20px;font-size:12px;color:var(--red);font-family:var(--font-mono);white-space:pre-wrap;
  }

  /* ===== Loading ===== */
  .loading{display:none;text-align:center;padding:48px;color:var(--text-3);font-size:13px}
  .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--cyan);animation:pulse 1.2s ease-in-out infinite;margin-right:8px}
  @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

  /* ===== Result Area ===== */
  .result-area{display:none}

  /* ===== Signal Header Bar ===== */
  .sig-bar{
    display:flex;align-items:center;gap:14px;
    padding:16px 24px;background:var(--bg-1);border:1px solid var(--border);
    border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  }
  .sig-direction{
    display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;
    font-size:13px;font-weight:600;letter-spacing:.3px;
  }
  .dir-bullish{background:var(--green-dim);color:var(--green);border:1px solid var(--green-dim)}
  .dir-bearish{background:var(--red-dim);color:var(--red);border:1px solid var(--red-dim)}
  .dir-neutral{background:var(--bg-3);color:var(--text-2);border:1px solid var(--border)}
  .sig-agent{font-size:13px;color:var(--text-2)}
  .sig-conf{margin-left:auto;font-size:28px;font-weight:700;font-family:var(--font-mono);letter-spacing:-1px}
  .sig-conf.bullish{color:var(--green)}.sig-conf.bearish{color:var(--red)}.sig-conf.neutral{color:var(--text-2)}

  /* ===== Signal Body ===== */
  .sig-body{
    background:var(--bg-1);border:1px solid var(--border);border-top:none;
    border-radius:0 0 var(--radius-lg) var(--radius-lg);padding:20px 24px;
  }
  .sig-reasoning{
    font-size:13px;color:var(--text-2);line-height:1.7;
    padding:14px 16px;background:var(--bg-2);border-radius:var(--radius);
    margin-bottom:20px;border-left:2px solid var(--cyan);
  }

  /* ===== Detail Grid ===== */
  .detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
  .detail-cell{padding:10px 14px;background:var(--bg-2);border-radius:6px;border:1px solid var(--border)}
  .detail-lbl{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
  .detail-val{font-size:13px;color:var(--text-1);font-weight:500;word-break:break-all}

  /* ===== Signals List ===== */
  .sig-list{list-style:none;margin-bottom:20px}
  .sig-list li{padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-2);display:flex;align-items:center;gap:8px}
  .sig-list li:last-child{border-bottom:none}
  .sig-list li::before{content:"›";color:var(--cyan);font-weight:700;font-size:14px}

  /* ===== Sentiment Gauge (舆情 Agent 专用) ===== */
  .sentiment-section{margin-bottom:20px}
  .sentiment-section .sec-title{
    font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;
    letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;gap:8px;
  }
  .sec-title::before{content:"";width:3px;height:12px;background:var(--cyan);border-radius:2px}

  .gauge-wrap{display:flex;gap:20px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
  .gauge-ring{position:relative;width:140px;height:140px;flex-shrink:0}
  .gauge-ring svg{transform:rotate(-90deg)}
  .gauge-ring .ring-bg{fill:none;stroke:var(--bg-3);stroke-width:8}
  .gauge-ring .ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dasharray .6s ease}
  .gauge-ring .ring-fg.bullish{stroke:var(--green)}
  .gauge-ring .ring-fg.bearish{stroke:var(--red)}
  .gauge-ring .ring-fg.neutral{stroke:var(--text-3)}
  .gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge-pct{font-size:28px;font-weight:700;font-family:var(--font-mono);letter-spacing:-1px}
  .gauge-pct.bullish{color:var(--green)}.gauge-pct.bearish{color:var(--red)}.gauge-pct.neutral{color:var(--text-2)}
  .gauge-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

  .gauge-stats{display:flex;flex-direction:column;gap:8px;flex:1;min-width:200px}
  .stat-row{display:flex;align-items:center;gap:10px;font-size:12px}
  .stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .stat-dot.bull{background:var(--green)}.stat-dot.bear{background:var(--red)}.stat-dot.neut{background:var(--text-3)}
  .stat-bar{flex:1;height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden}
  .stat-bar-fill{height:100%;border-radius:2px;transition:width .4s}
  .stat-bar-fill.bull{background:var(--green)}.stat-bar-fill.bear{background:var(--red)}.stat-bar-fill.neut{background:var(--text-3)}
  .stat-num{color:var(--text-1);font-weight:600;min-width:30px;text-align:right;font-family:var(--font-mono)}

  /* ===== Emotion State Badge ===== */
  .emotion-state{
    display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;
    font-size:12px;font-weight:600;margin-bottom:16px;
  }
  .emotion-state.hot{background:var(--red-dim);color:var(--red);border:1px solid var(--red-dim)}
  .emotion-state.panic{background:var(--green-dim);color:var(--green);border:1px solid var(--green-dim)}
  .emotion-state.neutral{background:var(--bg-3);color:var(--text-2);border:1px solid var(--border)}
  .emotion-state.bullish{background:var(--green-dim);color:var(--green);border:1px solid var(--green-dim)}
  .emotion-state.bearish{background:var(--red-dim);color:var(--red);border:1px solid var(--red-dim)}

  /* ===== Dual Column (看多 vs 看空) ===== */
  .dual-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  .col-card{padding:16px;border-radius:var(--radius);border:1px solid var(--border)}
  .col-card.bull{background:var(--green-bg);border-color:var(--green-dim)}
  .col-card.bear{background:var(--red-bg);border-color:var(--red-dim)}
  .col-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .col-title.bull{color:var(--green)}.col-title.bear{color:var(--red)}
  .col-title .icon{font-size:14px}
  .col-items{list-style:none}
  .col-items li{padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-2)}
  .col-items li:last-child{border-bottom:none}

  /* ===== Evidence Table ===== */
  .evidence-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px}
  .evidence-table th{
    text-align:left;padding:8px 12px;background:var(--bg-2);color:var(--text-3);
    font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:10px;
    border-bottom:1px solid var(--border);
  }
  .evidence-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text-2)}
  .evidence-table tr:hover td{background:var(--bg-2)}
  .ev-sent{font-weight:600;font-size:11px;padding:2px 8px;border-radius:10px}
  .ev-sent.bullish{background:var(--green-dim);color:var(--green)}
  .ev-sent.bearish{background:var(--red-dim);color:var(--red)}

  /* ===== Risk / Uncertainties ===== */
  .risk-section{margin-bottom:16px}
  .risk-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .risk-tag{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:500;border:1px solid}
  .risk-tag.risk{border-color:var(--amber-dim);color:var(--amber);background:var(--amber-dim)}
  .risk-tag.uncertain{border-color:var(--border);color:var(--text-3);background:var(--bg-2)}
  .risk-tag.finding{border-color:var(--cyan-dim);color:var(--cyan);background:var(--cyan-bg)}

  /* ===== Steps Chain ===== */
  .steps-chain{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
  .steps-chain .sec-title{margin-bottom:12px}
  .step-item{
    display:flex;align-items:flex-start;gap:10px;padding:10px 14px;
    background:var(--bg-2);border-radius:6px;border:1px solid var(--border);
    margin-bottom:6px;transition:border .15s;
  }
  .step-item:hover{border-color:var(--border-light)}
  .step-item.bullish{border-left:3px solid var(--green);background:var(--green-bg)}
  .step-item.bearish{border-left:3px solid var(--red);background:var(--red-bg)}
  .step-item.neutral{border-left:3px solid var(--text-3)}
  .step-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center;line-height:1.4}
  .step-body{flex:1;min-width:0}
  .step-name{font-size:13px;font-weight:600;color:var(--text-1)}
  .step-badge{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600;margin-left:6px}
  .step-badge.pass{background:var(--green-dim);color:var(--green)}
  .step-badge.fail{background:var(--red-dim);color:var(--red)}
  .step-badge.warn{background:var(--amber-dim);color:var(--amber)}
  .step-badge.none{background:var(--bg-3);color:var(--text-3)}
  .step-desc{font-size:11px;color:var(--text-3);margin-top:2px}
  .step-signal{font-size:12px;color:var(--text-2);font-weight:500;margin-top:2px}
  .step-details{font-size:10px;color:var(--text-3);margin-top:4px;font-family:var(--font-mono);word-break:break-all}
  .score-line{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:10px;padding:8px 14px;background:var(--cyan-bg);border:1px solid var(--cyan-dim);
    border-radius:6px;font-size:13px;color:var(--cyan);
  }

  /* ===== Market + Stock Sections ===== */
  .market-section{
    padding:16px 20px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg);
    margin-top:16px;
  }

  /* ===== Orchestrate Result ===== */
  .orch-result{margin-top:20px}
  .orch-decision{
    padding:16px 20px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);
    margin-bottom:16px;
  }
  .orch-decision .dec-label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
  .orch-decision .dec-val{font-size:18px;font-weight:700}

  /* ===== History ===== */
  .history-panel{margin-top:24px}
  .history-item{
    display:flex;align-items:center;gap:12px;padding:10px 16px;
    border-bottom:1px solid var(--border);font-size:12px;cursor:pointer;transition:background .1s;
  }
  .history-item:hover{background:var(--bg-2)}
  .history-item:last-child{border-bottom:none}
  .h-time{color:var(--text-3);font-size:11px;min-width:60px;font-family:var(--font-mono)}
  .h-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .h-dot.bullish{background:var(--green);box-shadow:0 0 6px var(--green-dim)}
  .h-dot.bearish{background:var(--red);box-shadow:0 0 6px var(--red-dim)}
  .h-dot.neutral{background:var(--text-3)}
  .h-stock{font-weight:600;color:var(--cyan);min-width:70px;font-family:var(--font-mono)}
  .h-reason{color:var(--text-3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ===== Footer ===== */
  .footer{text-align:center;padding:32px;font-size:11px;color:var(--text-3);border-top:1px solid var(--border);margin-top:40px}

  /* ===== Responsive ===== */
  @media(max-width:768px){
    .main{padding:16px}
    .ctrl{flex-direction:column}
    .ctrl-group{min-width:100%}
    .dual-col{grid-template-columns:1fr}
    .gauge-wrap{flex-direction:column;align-items:stretch}
    .gauge-ring{margin:0 auto}
  }
</style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">
      <span class="dot"></span>
      AI Renaissance
      <span>Debug Console</span>
    </div>
    <div class="topbar-nav">
      <a href="/" class="active">Agent Debug</a>
      <a href="/data">Data Debug</a>
    </div>
    <div class="topbar-status">
      <span class="live">● ONLINE</span>
      <span>v0.2</span>
    </div>
  </div>

<div class="main">

  <!-- Control Panel -->
  <div class="ctrl">
    <div class="ctrl-group">
      <label>Agent</label>
      <select id="agentSelect">
        <option value="">— Select Agent —</option>
      </select>
    </div>
    <div class="ctrl-group" style="max-width:180px;">
      <label>Stock Code</label>
      <input id="stockCode" type="text" placeholder="600519" />
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0;">
      <button class="btn-run" id="runBtn" onclick="runAgent()">▶ RUN</button>
      <button class="btn-orch" id="orchBtn" onclick="runOrchestrate()">⚡ ORCHESTRATE</button>
    </div>
  </div>

  <!-- Agent Info -->
  <div class="agent-info" id="agentInfo"></div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <span class="pulse"></span>Agent processing...
  </div>

  <!-- Result Area -->
  <div class="result-area" id="resultArea"></div>

  <!-- History -->
  <div class="history-panel" id="historyPanel" style="display:none;">
    <div style="background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;">
      <div style="padding:14px 20px;font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border)">History</div>
      <div id="historyList"></div>
    </div>
  </div>

  <div class="footer">
    AI Renaissance · Debug → Validate → PR to develop → Review → Merge
  </div>

</div>

<script>
// ── State ────────────────────────────────────────────
let agents = {};
let history = [];

// ── Init ─────────────────────────────────────────────
async function init() {
  try {
    const resp = await fetch("/api/agents");
    const data = await resp.json();
    const sel = document.getElementById("agentSelect");
    data.forEach(a => {
      const opt = document.createElement("option");
      opt.value = a.name;
      opt.textContent = `${a.name} · ${a.owner}`;
      opt.dataset.description = a.description || "";
      sel.appendChild(opt);
    });
    agents = data;
  } catch(e) { console.error("Failed to load agents", e); }
}

// ── Agent select change ──────────────────────────────
document.getElementById("agentSelect").addEventListener("change", function() {
  const info = document.getElementById("agentInfo");
  if (!this.value) { info.style.display = "none"; return; }
  const opt = this.options[this.selectedIndex];
  info.innerHTML = `<strong>${this.value}</strong> — ${opt.dataset.description || ""}`;
  info.style.display = "block";
});

// ── Run Agent ────────────────────────────────────────
async function runAgent() {
  const agentName = document.getElementById("agentSelect").value;
  const stockCode = document.getElementById("stockCode").value.trim();
  if (!agentName) { showError("Please select an Agent"); return; }
  if (!stockCode)  { showError("Please enter a stock code"); return; }

  hideError();
  document.getElementById("loading").style.display = "block";
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("resultArea").innerHTML = "";
  document.getElementById("runBtn").disabled = true;

  try {
    const resp = await fetch("/api/debug", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({agent_name: agentName, stock_code: stockCode}),
    });
    const data = await resp.json();
    if (data.error) {
      showError(data.error + (data.traceback ? "\n\n" + data.traceback : ""));
    } else {
      renderResult(data.result, agentName, stockCode);
      addHistory(data.result, agentName, stockCode);
    }
  } catch(e) {
    showError("Network error: " + e.message);
  } finally {
    document.getElementById("loading").style.display = "none";
    document.getElementById("runBtn").disabled = false;
  }
}

// ── Run Orchestrate ──────────────────────────────────
async function runOrchestrate() {
  const stockCode = document.getElementById("stockCode").value.trim();
  if (!stockCode) { showError("Please enter a stock code"); return; }

  hideError();
  document.getElementById("loading").style.display = "block";
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("resultArea").innerHTML = "";
  document.getElementById("orchBtn").disabled = true;

  try {
    const resp = await fetch("/api/orchestrate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({stock_code: stockCode}),
    });
    const data = await resp.json();
    if (data.error) {
      showError(data.error + (data.traceback ? "\n\n" + data.traceback : ""));
    } else {
      renderOrchestrateResult(data.result, stockCode);
      addHistory({direction: data.result.direction, confidence: data.result.confidence, reasoning: data.result.reasoning}, "Orchestrator", stockCode);
    }
  } catch(e) {
    showError("Network error: " + e.message);
  } finally {
    document.getElementById("loading").style.display = "none";
    document.getElementById("orchBtn").disabled = false;
  }
}

// ── Render Result ────────────────────────────────────
function renderResult(sig, agentName, stockCode) {
  const dir = (sig.direction || "neutral").toLowerCase();
  const conf = sig.confidence || 0;
  const confPct = Math.round(conf * 100);
  const meta = sig.meta || {};
  const isNews = (sig.signal_type === "news" || agentName.includes("舆情"));
  const hasTriple = isNews && meta.market && meta.industry && meta.stock; // v0.3 大盘+行业+个股
  const hasDual = isNews && meta.market && meta.stock; // v0.2 大盘+个股
  let html = "";

  // === Signal Header Bar ===
  html += `
    <div class="sig-bar">
      <span class="sig-direction dir-${dir}">${dirIcon(dir)} ${dirLabel(dir)}</span>
      <span class="sig-agent">${agentName} · ${sig.signal_type || "—"}</span>
      <span class="sig-conf ${dir}">${confPct}%</span>
    </div>
    <div class="sig-body">
  `;

  // === Reasoning ===
  html += `<div class="sig-reasoning">${sig.reasoning || "No reasoning provided"}</div>`;

  // === v0.3: 大盘+行业+个股 三层展示 ===
  if (hasTriple) {
    html += renderMarketSentiment(meta.market);
    html += renderIndustrySentiment(meta.industry);
    html += renderStockSentiment(meta.stock, dir, confPct);
  } else if (hasDual) {
    html += renderMarketSentiment(meta.market);
    html += renderStockSentiment(meta.stock, dir, confPct);
  } else if (isNews && meta.bullish_count !== undefined) {
    // v0.1 兼容
    html += renderSentimentDashboard(meta, dir, confPct);
  }

  // === Signals List ===
  if (sig.signals && sig.signals.length) {
    html += `<div class="sentiment-section"><div class="sec-title">Detected Signals</div><ul class="sig-list">`;
    sig.signals.forEach(s => { html += `<li>${s}</li>`; });
    html += `</ul></div>`;
  }

  // === Core Metrics Row ===
  const metrics = [];
  if (meta.risk_level) metrics.push(["Risk Level", meta.risk_level]);
  if (meta.time_horizon) metrics.push(["Time Horizon", meta.time_horizon]);
  if (meta.needs_human_review !== undefined) metrics.push(["Human Review", meta.needs_human_review ? "⚠ Yes" : "✓ No"]);
  metrics.push(["Stock Code", sig.stock_code || stockCode]);
  metrics.push(["Signal Type", sig.signal_type || "—"]);
  metrics.push(["Output Version", meta.output_version || "—"]);

  html += `<div class="detail-grid">`;
  metrics.forEach(([k,v]) => {
    html += `<div class="detail-cell"><div class="detail-lbl">${k}</div><div class="detail-val">${v}</div></div>`;
  });
  html += `</div>`;

  html += `</div>`; // close sig-body

  document.getElementById("resultArea").innerHTML = html;
  document.getElementById("resultArea").style.display = "block";

  // Animate gauge after render
  if (hasTriple) {
    setTimeout(() => animateTempGauge(meta.market.score), 100);
    setTimeout(() => animateIndustryGauge(meta.industry.score), 150);
  } else if (hasDual) {
    setTimeout(() => animateTempGauge(meta.market.score), 100);
  } else if (isNews && meta.bullish_count !== undefined) {
    setTimeout(() => animateGauge(confPct, dir), 100);
  }
}

// ── Animate Industry Gauge ────────────
function animateIndustryGauge(score) {
  const ring = document.getElementById("industryRing");
  const pct = document.getElementById("industryPct");
  if (!ring || !pct) return;
  const circumference = 2 * Math.PI * 58;
  const targetDash = (score / 100) * circumference;
  setTimeout(() => {
    ring.setAttribute("stroke-dasharray", `${targetDash} ${circumference}`);
    let current = 0;
    const step = score / 30;
    const timer = setInterval(() => {
      current += step;
      if (current >= score) { current = score; clearInterval(timer); }
      pct.textContent = Math.round(current);
    }, 20);
  }, 100);
}

// ── Stock Sentiment (个股舆情) ────────────
function renderStockSentiment(stock, dir, confPct) {
  const emotionState = stock.emotion_state || "";

  const bearRatio = 1 - bullRatio;
  const polarization = stock.polarization || 0;
  const totalPosts = stock.total_posts || 0;

  const bearCount = stock.bearish_count || 0;
  const evidence = stock.evidence || [];

  const bullPct = Math.round(bullRatio * 100);
  const bearPct = Math.round(bearRatio * 100);

  let html = `<div class="market-section" style="margin-top:16px">

  if (emotionState) {

                   emotionState.includes("乐观") ? "bullish" :

// ── Animate Gauge Ring ────────────────────────────────
function animateGauge(pct, dir) {
  const ring = document.getElementById("gaugeRing");
  const label = document.getElementById("gaugePct");
  if (!ring) return;
  const circumference = 2 * Math.PI * 58; // ~364.42
  const target = circumference * (pct / 100);
  let current = 0;
  const step = Math.max(1, pct / 30);
  const interval = setInterval(() => {
    current = Math.min(current + step, pct);
    const dash = circumference * (current / 100);
    ring.setAttribute("stroke-dasharray", `${dash} ${circumference}`);
    label.textContent = Math.round(current) + "%";
    if (current >= pct) clearInterval(interval);
  }, 20);
}

// ── Render Orchestrate Result ────────────────────────
function renderOrchestrateResult(result, stockCode) {
  const dir = (result.direction || "neutral").toLowerCase();
  const conf = Math.round((result.confidence || 0) * 100);
  let html = `
    <div class="sig-bar">
      <span class="sig-direction dir-${dir}">${dirIcon(dir)} ${dirLabel(dir)}</span>
      <span class="sig-agent">Orchestrator · ${stockCode}</span>
      <span class="sig-conf ${dir}">${conf}%</span>
    </div>
    <div class="sig-body">
      <div class="sig-reasoning">${result.reasoning || ""}</div>
      <div class="detail-grid">
        <div class="detail-cell"><div class="detail-lbl">Decision</div><div class="detail-val">${result.decision || "—"}</div></div>
        <div class="detail-cell"><div class="detail-lbl">Position Ratio</div><div class="detail-val">${result.position_ratio || "—"}</div></div>
        <div class="detail-cell"><div class="detail-lbl">Direction</div><div class="detail-val">${dirLabel(dir)}</div></div>
        <div class="detail-cell"><div class="detail-lbl">Confidence</div><div class="detail-val">${conf}%</div></div>
      </div>
  `;

  if (result.signals_summary) {
    html += `<div class="sentiment-section"><div class="sec-title">Signals Summary</div><ul class="sig-list">`;
    if (Array.isArray(result.signals_summary)) {
      result.signals_summary.forEach(s => { html += `<li>${s}</li>`; });
    } else {
      // Handle dict format: {total: N, bullish: N, bearish: N, neutral: N}
      const summary = result.signals_summary;
      if (summary.total !== undefined) html += `<li>Total: ${summary.total}</li>`;
      if (summary.bullish !== undefined) html += `<li>Bullish: ${summary.bullish}</li>`;
      if (summary.bearish !== undefined) html += `<li>Bearish: ${summary.bearish}</li>`;
      if (summary.neutral !== undefined) html += `<li>Neutral: ${summary.neutral}</li>`;
    }
    html += `</ul></div>`;
  }

  if (result.risks && result.risks.length) {
    html += `<div class="risk-section"><div class="sec-title">Risks</div><div class="risk-tags">`;
    result.risks.forEach(r => { html += `<span class="risk-tag risk">${r}</span>`; });
    html += `</div></div>`;
  }

  if (result.reasoning_chain && result.reasoning_chain.length) {
    html += `<div class="sentiment-section"><div class="sec-title">Reasoning Chain</div>`;
    result.reasoning_chain.forEach((step, i) => {
      html += `<div class="step-item neutral"><div class="step-icon">${i+1}</div><div class="step-body"><div class="step-name">${step}</div></div></div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  document.getElementById("resultArea").innerHTML = html;
  document.getElementById("resultArea").style.display = "block";
}

// ── Steps Chain ──────────────────────────────────────
function renderStepsChain(steps) {
  if (!steps || !steps.length) return "";
  let bullish = 0, bearish = 0;
  steps.forEach(s => { if (s.status==="bullish") bullish++; else if (s.status==="bearish") bearish++; });
  const statusLabel = {bullish:{text:"PASS",cls:"pass"},bearish:{text:"RISK",cls:"fail"},neutral:{text:"—",cls:"none"},warning:{text:"WARN",cls:"warn"}};
  const items = steps.map(s => {
    const lb = statusLabel[s.status] || statusLabel.neutral;
    return `<div class="step-item ${s.status}">
      <div class="step-icon">${s.icon || "·"}</div>
      <div class="step-body">
        <span class="step-name">${s.step}. ${s.name}</span>
        <span class="step-badge ${lb.cls}">${lb.text}</span>
        <div class="step-desc">${s.description || ""}</div>
        <div class="step-signal">${s.signal || ""}</div>
        ${s.details && s.details.length ? `<div class="step-details">${s.details.join("<br>")}</div>` : ""}
      </div>
    </div>`;
  }).join("");
  const net = bullish - bearish;
  const netLabel = net > 0 ? `+${net}` : `${net}`;
  const netClass = net > 0 ? "step-score-bull" : net < 0 ? "step-score-bear" : "";
  return `<div class="steps-chain">
    <div class="sec-title">Validation Chain</div>
    ${items}
    <div class="score-line">
      <span>Net Score</span>
      <span><strong>${netLabel}</strong> (Bull ${bullish} / Bear ${bearish})</span>
    </div>
  </div>`;
}

// ── History ──────────────────────────────────────────
function addHistory(sig, agentName, stockCode) {
  history.unshift({time:new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit"}),sig,agentName,stockCode});
  if (history.length > 20) history.pop();
  renderHistory();
}
function renderHistory() {
  if (!history.length) return;
  document.getElementById("historyPanel").style.display = "block";
  document.getElementById("historyList").innerHTML = history.map((h,i) => {
    const dir = (h.sig.direction || "neutral").toLowerCase();
    return `<div class="history-item" onclick='rerun(${i})'>
      <span class="h-time">${h.time}</span>
      <span class="h-dot ${dir}"></span>
      <span class="h-stock">${h.stockCode}</span>
      <span class="h-reason">${h.agentName} — ${h.sig.reasoning || ""}</span>
    </div>`;
  }).join("");
}
function rerun(i) {
  const h = history[i];
  document.getElementById("stockCode").value = h.stockCode;
  // find agent in select
  const sel = document.getElementById("agentSelect");
  for (let opt of sel.options) { if (opt.value === h.agentName) { sel.value = h.agentName; break; } }
  renderResult(h.sig, h.agentName, h.stockCode);
}

// ── Helpers ──────────────────────────────────────────
function dirLabel(d) { return d==="bullish"?"BULLISH":d==="bearish"?"BEARISH":"NEUTRAL"; }
function dirIcon(d) { return d==="bullish"?"▲":d==="bearish"?"▼":"◆"; }
function fmtVal(v) {
  if (v === null || v === undefined) return "—";
  if (typeof v === "object") return Array.isArray(v) ? `(${v.length} items)` : JSON.stringify(v);
  return String(v);
}
function showError(msg) { const b=document.getElementById("errorBox");b.textContent=msg;b.style.display="block"; }
function hideError() { document.getElementById("errorBox").style.display="none"; }

// ── Keyboard shortcut ────────────────────────────────
document.getElementById("stockCode").addEventListener("keyup", e => { if(e.key==="Enter") runAgent(); });

// Boot
init();
</script>
