chain_name: ai-computing
industry_name: AI算力芯片/ASIC/先进封装
industry_name_en: AI Computing Chips & Advanced Packaging
tags: [AI芯片, GPU, ASIC, 先进封装, 推理芯片, HBM, 国产算力]

upstream:
  nodes:
    - name: EDA/IP核
      key_players: [Synopsys, Cadence, 华大九天, 广立微]
      key_metrics:
        - EDA工具授权收入
        - 先进制程IP核出货量
        - 国产EDA渗透率
      price_benchmark: "先进制程IP授权费年涨10-15%"
      shortage_indicator: "国产EDA在5nm以下仍有差距"
    - name: 晶圆制造/代工
      key_players: [台积电, 三星, 中芯国际, 华虹半导体]
      key_metrics:
        - 先进制程产能利用率(3nm/5nm/7nm)
        - 资本开支
        - 扩产计划
      price_benchmark: "3nm代工价格$2万+/片"
      shortage_indicator: "台积电3nm产能预订至2027年"
    - name: 封测/先进封装基板
      key_players: [日月光, 安靠, 长电科技, 通富微电]
      key_metrics:
        - 先进封装产能(CoWoS/FOPLP)
        - HBM堆叠良率
        - 封装单价
      price_benchmark: "CoWoS封装价格$800-1200/颗"
      shortage_indicator: "CoWoS产能严重不足，台积电扩产中"
    - name: HBM存储颗粒
      key_players: [SK海力士, 三星, 美光]
      key_metrics:
        - HBM3E出货量
        - 堆叠层数(8Hi→12Hi→16Hi)
        - 单价
      price_benchmark: "HBM3E单价$200-250"
      shortage_indicator: "HBM产能被NVDA/AMD提前锁定"

midstream:
  nodes:
    - name: GPU/AI加速芯片
      key_players: [英伟达, AMD, 英特尔, 华为昇腾, 寒武纪, 海光信息]
      key_metrics:
        - GPU出货量
        - 训练/推理性能比
        - 市场份额
      price_benchmark: "H100/B200单价$2.5-4万"
      shortage_indicator: "高端GPU仍受出口管制影响"
    - name: 定制化ASIC
      key_players: [Google TPU, 亚马逊Trainium, 芯原股份, 寒武纪]
      key_metrics:
        - ASIC定制订单量
        - 推理场景渗透率
        - 功耗效率
      price_benchmark: "ASIC推理成本比GPU低30-50%"
      shortage_indicator: "推理ASIC需求爆发，产能爬坡中"
    - name: AI芯片设计服务
      key_players: [芯原股份, 灿芯股份, 创意电子]
      key_metrics:
        - 新签订单金额
        - 在手订单
        - AI相关订单占比
      price_benchmark: "芯片设计服务单价随复杂度提升"
      shortage_indicator: "AI芯片设计人才紧缺"
    - name: 光互连/CPO芯片
      key_players: [博通, Marvell, 思科]
      key_metrics:
        - CPO芯片出货量
        - 硅光集成度
        - 功耗降低幅度
      price_benchmark: "CPO芯片单价$500-1000"
      shortage_indicator: "CPO技术从实验室走向量产"

downstream:
  nodes:
    - name: AI服务器/算力集群
      key_players: [英伟达, 工业富联, 浪潮, 超微]
      key_metrics:
        - AI服务器出货量
        - 单机GPU数量(8卡→16卡→32卡)
        - 配套芯片价值量
      capex_benchmark: "AI服务器单机芯片价值量$20万+"
      demand_indicator: "推理服务器需求增速超训练2倍"
    - name: 云厂商/AI工厂
      key_players: [微软, 谷歌, 亚马逊, Meta, 字节, 阿里]
      key_metrics:
        - 年度AI Capex
        - 自研芯片进展
        - 算力租赁价格
      capex_benchmark: "北美四大云厂商CAPEX $7250亿+77%"
      demand_indicator: "推理算力需求占比从30%→70%"
    - name: 边缘AI/终端
      key_players: [苹果, 高通, 联发科]
      key_metrics:
        - 边缘AI芯片出货量
        - NPU算力(TOPS)
        - AI手机/PC渗透率
      demand_indicator: "AI手机渗透率2026年达35%"

value_allocation:
  upstream_share: 35
  midstream_share: 30
  downstream_share: 35
  bargaining_power: "上游晶圆代工/HBM垄断性极强；中游芯片设计差异化竞争；下游云厂商集中度高"

life_cycle:
  stage: 快速成长期
  penetration_range: "25-50%"
  growth_driver: "训练→推理结构性转变 + ASIC渗透率提升 + 先进封装(CoWoS/FOPLP)产能扩张 + 国产替代"
  risk_factor: "出口管制升级；技术路线变迁(CPO替代传统光模块)；推理需求不及预期"

signal_weights:
  barometric: 1.3
  mid_axis: 1.1
  ebb_warning: 0.7

key_catalysts:
  - "英伟达Rubin架构出货节奏"
  - "推理ASIC大规模商用"
  - "CoWoS产能释放进度"
  - "国产GPU/昇腾出货放量"
  - "HBM4量产时间表"

preset_indicators:
  barometric:
    - indicator: GPU/ASIC出货量
      unit: 万颗
      trigger: 季度环比≥+15%
      current: "持续高增长"
      source: "产业链调研"
    - indicator: HBM出货量
      unit: 万颗
      trigger: 季度环比≥+20%
      current: "供不应求"
      source: "原厂财报"
    - indicator: 先进封装产能利用率
      unit: '%'
      trigger: ≥95%连续2季
      current: "台积电CoWoS满产"
      source: "产业链调研"
    - indicator: 晶圆代工价格
      unit: USD/片
      trigger: 连续2季环比上涨≥5%
      current: "3nm/5nm涨价"
      source: "台积电公告"
    - indicator: ASIC定制订单
      unit: 亿元
      trigger: 季度环比≥+30%
      current: "芯原股份订单+103%"
      source: "公司公告"

  mid_axis:
    - indicator: AI芯片厂商营收增速
      unit: '%'
      trigger: 同比≥+40%
      current: "头部+50-80%"
      source: "财报数据"
    - indicator: 芯片设计服务订单
      unit: 亿元
      trigger: 在手订单≥50亿
      current: "芯原50.75亿"
      source: "公司公告"
    - indicator: 封装测试毛利率
      unit: '%'
      trigger: 环比提升≥2pp
      current: "温和改善"
      source: "财报数据"
    - indicator: 推理芯片渗透率
      unit: '%'
      trigger: 季度环比≥+5pp
      current: "推理占比52%"
      source: "行业研报"
    - indicator: 国产GPU出货量
      unit: 万颗
      trigger: 季度环比≥+20%
      current: "昇腾/寒武纪放量"
      source: "产业调研"

  ebb_warning:
    - indicator: 训练芯片需求增速
      unit: '%'
      trigger: 同比降至≤+10%
      current: "增速放缓"
      source: "行业研报"
    - indicator: GPU库存周转天数
      unit: 天
      trigger: 升至60天+
      current: "30-45天"
      source: "财报数据"
    - indicator: 出口管制影响
      unit: 等级
      trigger: 新增管制清单
      current: "持续高压"
      source: "政策跟踪"
    - indicator: CPO替代速度
      unit: '%'
      trigger: 渗透率超预期突破40%
      current: "~10%"
      source: "LightCounting"

preset_companies:
  - code: "688521.SH"
    name: 芯原股份
    position: "中游芯片设计服务"
    logic: "国内唯一全球顶级ASIC设计服务商，2025新签订单59.6亿+103%，AI ASIC订单占比73%"
  - code: "688256.SH"
    name: 寒武纪
    position: "中游AI芯片"
    logic: "国产AI芯片龙头，思元系列训练/推理全覆盖"
  - code: "688041.SH"
    name: 海光信息
    position: "中游CPU+DCU"
    logic: "x86生态最成熟国产CPU，DCU对标A100"
  - code: "002156.SZ"
    name: 通富微电
    position: "中游先进封装"
    logic: "AMD核心封测商，先进封装(CoWoS/FOPLP)受益"
  - code: "600584.SH"
    name: 长电科技
    position: "中游封测"
    logic: "封测龙头，先进封装技术储备深厚"

cross_verify:
  upstream: ["688981.SH", "688012.SH"]  # 中芯国际/中微公司
  midstream: ["688521.SH", "688256.SH"]  # 芯原/寒武纪
  downstream: ["601138.SH"]  # 工业富联
  external_indicators:
    - name: "全球AI芯片市场"
      metric: "$2800亿，+40%"
      source: "行业预测2026"
    - name: "推理芯片市场"
      metric: "$1450亿，占比52%"
      source: "行业预测2026"
