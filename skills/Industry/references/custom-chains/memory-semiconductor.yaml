# 存储器产业链监控配置

## 上游气压异动指标
1. NAND/DRAM合约价：连续3月环比上涨≥20%
2. HBM3E交货周期：延长≥2倍
3. 存储原厂（三星/SK海力士/美光）预收款/合同负债：连续2季环比≥30%
4. 3D NAND层数提升计划：从300层向400层加速推进
5. 存储设备（刻蚀机/CVD）交货周期：延长≥50%
6. 存储晶圆代工产能利用率：维持≥90%

## 中游中轴共振指标
1. 存储模组厂商毛利率：连续2季环比≥5pp
2. 企业级SSD交付周期：从6周延至16周+
3. 长鑫/长江存储产能利用率：≥90%
4. 苹果评估引入国产存储供应商：进入实质性验证阶段
5. PCIe Retimer芯片订单：同比增长≥100%
6. 存储模组厂订单backlog：同比增长≥50%

## 下游退潮警示指标
1. 智能手机/PC出货量：连续2季同比下滑≥10%
2. 存储模组库存周转天数：升至60天+
3. DRAM/NAND现货价：连续2月环比下跌
4. 存储原厂宣布扩产：单季度≥2家新增Fab计划
5. 下游客户行为变化：从补库存转向消耗库存
6. HBM产能释放：2027年HBM供给不再紧张（高盛预测逆转）

## 数据来源
- 价格：TrendForce、DRAMeXchange
- 财报：同花顺、Wind
- 产业：IDC、Canalys、券商调研

## 监控频率
- 合约价/现货价：每周
- 出货量：每月（IDC/Canalys发布）
- 产能/资本开支：每季度
