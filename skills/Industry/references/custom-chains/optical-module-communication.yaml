# 光模块/光通信产业链监控配置

## 上游气压异动指标
1. InP衬底价格（2寸/4寸/6寸）：连续3月环比上涨≥15%
2. DSP芯片（Marvell/博通）交货周期：延长≥2倍
3. EML/CW激光器价格：涨幅≥20%
4. 光芯片库存天数：降至≤15天
5. 硅光晶圆代工产能预订：头部Foundry（台积电/中芯）预订爆满
6. 薄膜铌酸锂晶圆价格：连续2季环比上涨≥10%

## 中游中轴共振指标
1. 光模块厂商毛利率：连续2季环比≥3pp
2. 800G/1.6T模块交付周期：从8周延至20周+
3. 头部厂商（中际旭创/新易盛/天孚通信）产能利用率：≥90%
4. 云厂商签订长约锁定产能：12个月以上长约占比≥30%
5. Lumentum/Coherent订单能见度：延伸至2027年+
6. 硅光模块出货量占比：季度环比提升≥5pp

## 下游退潮警示指标
1. 云厂商Capex增速：从≥+40%降至≤+10%
2. 光模块库存周转天数：从45天升至90天+
3. 800G模块价格：连续2月环比下跌
4. 谷歌/Meta/微软推迟数据中心建设：≥1个主要项目延迟
5. 硅光技术替代传统方案速度：季度替代率提升≥10pp
6. 北美科技巨头AI资本开支指引：下调≥10%

## 数据来源
- 价格：产业调研、日本供应商报价、公司公告
- 财报：同花顺、Wind
- 产业：LightCounting、Omdia、券商调研

## 监控频率
- 价格/交付周期：每周
- 订单/长约：每季度
- 技术路线（CPO/LPO）：每半年（OFC/ECOC展会后）
