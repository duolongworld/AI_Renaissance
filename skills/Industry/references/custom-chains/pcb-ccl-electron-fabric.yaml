# PCB/覆铜板/电子布产业链监控配置

## 上游气压异动指标
1. 电子布价格（7628规格）：连续3月环比上涨≥10%
2. 环氧树脂/双酚A价格：涨幅≥40%
3. 铜箔加工费：上涨≥50%
4. 丰田喷气织布机交货周期：延长≥2倍（正常4周→12周+）
5. 电子布库存天数：降至≤7天
6. 覆铜板原材料成本（树脂+玻纤+铜箔）：连续2月环比上涨≥15%

## 中游中轴共振指标
1. CCL厂商毛利率：连续2季环比≥3pp
2. FR-4覆铜板交付周期：从4周延至12周+
3. CCL厂商产能利用率：维持≥90%
4. 头部PCB厂接受CCL涨价传导率：≥80%
5. M9/M10高速材料认证进度：头部厂商（沪电/深南）完成送测
6. 南亚新材/生益科技订单backlog：同比增长≥50%

## 下游退潮警示指标
1. PCB厂商库存周转天数：从30天升至60天+
2. AI服务器订单取消率：≥10%
3. 覆铜板价格：连续2月环比下跌
4. 头部CCL厂商扩产公告：3个月内≥3家发布扩产计划
5. 英伟达Rubin架构出货延迟：非计划性推迟≥1个季度
6. 下游消费电子/家电PCB需求：连续2季同比下滑≥15%

## 数据来源
- 价格：百川盈孚、ICIS、卓创资讯
- 财报：同花顺、Wind
- 产业：券商调研纪要、产业链访谈

## 监控频率
- 价格指标：每周
- 订单/产能：每季度（财报季）
- 技术认证：每半年
