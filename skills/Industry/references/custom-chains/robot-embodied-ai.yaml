# 机器人/具身智能产业链监控配置

## 上游气压异动指标
1. 谐波减速器/行星滚柱丝杠订单：头部厂商订单暴增≥50%
2. 空心杯电机交货周期：延长≥2倍
3. 六维力传感器厂商预收款：增长≥50%
4. 轻量化材料（镁合金/碳纤维）价格：上涨≥15%
5. 机器人核心部件进口替代加速：国产份额季度环比≥5pp
6. 精密加工设备（螺纹磨床）交货周期：延长≥50%

## 中游中轴共振指标
1. Tier 1供应商机器人业务营收占比：从<5%提升至≥20%
2. 特斯拉/宇树确认供应商名单并发布量产时间表
3. 关节模组交付周期：延长≥50%
4. 灵巧手成本降至可量产水平：<5000美元
5. 国内厂商获得Tesla/英伟达/宇树订单：≥1家确认
6. 机器人零部件企业毛利率：连续2季环比≥3pp

## 下游退潮警示指标
1. Tesla Optimus量产推迟：非计划内延迟≥3个月
2. 机器人概念股市盈率中位数：>100倍但无订单验证
3. 人形机器人售价：无法降至3万美元以下
4. 下游工厂试点反馈：故障率>5%
5. 政策补贴退坡：国家级补贴削减≥30%
6. 核心零部件库存周转天数：从30天升至60天+

## 数据来源
- 订单：公司公告、产业链访谈
- 价格：产业调研、券商纪要
- 财报：同花顺、Wind
- 政策：工信部、科技部公告

## 监控频率
- 订单/量产进度：每月
- 成本/毛利率：每季度
- 政策变化：实时跟踪
