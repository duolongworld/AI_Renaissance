# 半导体设备/材料产业链监控配置

## 上游气压异动指标
1. 特种气体/光刻胶价格：上涨≥20%
2. 晶圆代工设备（ASML/AMAT/Lam）交货周期：延长≥50%
3. 硅片价格：连续3月环比上涨≥10%
4. 中芯国际/华虹半导体资本开支计划：上调≥20%
5. 石英坩埚/电子级化学品库存天数：降至≤15天
6. 日本/美国设备出口管制变化：新增管制清单

## 中游中轴共振指标
1. 设备厂商（北方华创/中微公司）新签订单：同比增长≥50%
2. 材料厂商毛利率：连续2季环比≥3pp
3. 国产设备在28nm/14nm节点验证通过：≥1家晶圆厂完成验证
4. 晶圆厂产能利用率：≥85%持续2季
5. 半导体设备进口替代率：季度环比提升≥3pp
6. 设备厂商订单backlog：同比增长≥40%

## 下游退潮警示指标
1. 全球半导体销售额（WSTS）：连续2月环比下滑
2. 存储/PC/手机出货量：连续2季同比下滑≥10%
3. 晶圆厂推迟扩产计划：≥1家头部厂商推迟
4. 设备厂商应收账款增速：超过营收增速≥20pp
5. 成熟制程（28nm/40nm）价格战：报价季度环比下降≥10%
6. 美国对华半导体管制放松：EUV光刻机限制解除信号

## 数据来源
- 价格：产业调研、公司公告
- 财报：同花顺、Wind
- 产业：SEMI、WSTS、券商调研
- 政策：美国商务部BIS、中国工信部

## 监控频率
- 价格/订单：每周
- 销售额/出货量：每月（SEMI/WSTS发布）
- 验证/扩产：每季度
- 政策变化：实时跟踪
