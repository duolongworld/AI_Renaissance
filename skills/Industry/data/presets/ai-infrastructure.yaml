name: AI基础设施层
version: "1.0"
industry: ai-infrastructure
source: 黄仁勋AI五层蛋糕结构投研报告

# 产业链结构（上游 → 中游 → 下游）
chain:
  upstream:
    name: 上游 · 核心材料与元件
    segments:
      - name: 高速PCB/CCL
        key_items:
          - 高频高速覆铜板(M7→M8→M9)
          - HDI板(高阶任意层)
          - IC载板(ABF/BT)
          - M-SAP工艺
        key_players:
          - "建滔积层板"
          - "生益科技"
          - "沪电股份"
          - "胜宏科技"
        bottleneck: "M9材料认证周期6-8周，2026H1无法完成规模化切换"
        data_sources: "覆铜板价格跟踪、PCB厂商订单"
      - name: 连接器/线缆
        key_items:
          - 高速背板连接器
          - DAC/AOC线缆
          - 光纤连接器
        key_players:
          - "安费诺"
          - "莫仕"
          - "立讯精密"
          - "中航光电"
        bottleneck: "224G信号完整性要求提升，连接器需重新设计"
        data_sources: "连接器出货量、224G认证进度"
      - name: 散热材料
        key_items:
          - 导热界面材料(TIM)
          - 均热板(VC)
          - 热管
          - 3D打印散热器
        key_players:
          - "双鸿"
          - "奇鋐"
          - "中石科技"
        bottleneck: "240kW+单机柜散热，传统方案无法满足"
        data_sources: "散热模组出货量、液冷渗透率"

  midstream:
    name: 中游 · 设备与系统
    segments:
      - name: AI服务器整机
        key_items:
          - GPU服务器(8卡/16卡)
          - 液冷服务器
          - 整机柜交付
          - OCP标准
        key_players:
          - "工业富联"
          - "超微(SMCI)"
          - "浪潮信息"
          - "华勤技术"
        bottleneck: "英伟达GB200交付周期拉长，整机设计壁垒高"
        data_sources: "服务器出货量、英伟达指引"
      - name: 网络设备
        key_items:
          - 数据中心交换机(51.2T/102.4T)
          - 路由器
          - 智能网卡(DPU)
          - InfiniBand/RoCE
        key_players:
          - "Arista(ANET)"
          - "思科"
          - "华为"
          - "锐捷网络"
        bottleneck: "网络拓扑复杂度指数级上升，51.2T交换机缺货"
        data_sources: "交换机出货量、端口速率升级节奏"
      - name: 存储系统
        key_items:
          - 企业级SSD
          - NVMe-oF
          - 分布式存储
          - 对象存储
        key_players:
          - "三星"
          - "西部数据"
          - "Solidigm"
          - "德明利"
        bottleneck: "QLC SSD良率提升缓慢，企业级SSD价格上行"
        data_sources: "SSD出货量、企业级存储价格"

  downstream:
    name: 下游 · 部署与运营
    segments:
      - name: 超大规模数据中心
        key_items:
          - 土地/电力获取
          - 建筑设计(PUE优化)
          - 模块化部署
          - 算力集群搭建
        key_players:
          - "微软"
          - "谷歌"
          - "亚马逊"
          - "Meta"
        bottleneck: "四大巨头2026年CAPEX合计$6500亿，但实际落地受制于电力"
        data_sources: "云厂商CAPEX指引、数据中心开工"
      - name: AI工厂运营
        key_items:
          - 算力调度/编排
          - 模型训练服务
          - 推理优化(量化/剪枝)
          - MaaS平台
        key_players:
          - "CoreWeave"
          - "Lambda Labs"
          - "Together AI"
          - "百度智能云"
        bottleneck: "推理优化技术成熟度决定盈利模型"
        data_sources: "GPU利用率、推理延迟数据"
      - name: 边缘AI部署
        key_items:
          - 边缘计算节点
          - 5G MEC
          - 终端推理芯片
          - 联邦学习
        key_players:
          - "高通"
          - "英伟达Jetson"
          - "地平线"
          - "瑞芯微"
        bottleneck: "边缘算力vs功耗的平衡"
        data_sources: "边缘AI芯片出货量"

# 关键投资数据锚点
key_metrics:
  - metric: 全球AI基础设施支出
    value: "$4500亿 (2026E)"
    source: "行业研报"
  - metric: 四大云厂商CAPEX合计
    value: "$6500亿+ (2026E)"
    players: "微软/谷歌/亚马逊/Meta"
    source: "各公司财报指引"
  - metric: 单机柜功率密度
    value: "240kW+ (AI集群)"
    baseline: "6-10kW (传统DC)"
    source: "数据中心设计规范"
  - metric: 液冷渗透率
    value: "45% (2026E)"
    baseline: "31% (2025)"
    source: "行业研报"
  - metric: 高速PCB层数升级
    value: "22→28→36层"
    material: "M7→M8→M9"
    source: "PCB厂商技术路线图"
  - metric: 交换机端口速率
    value: "51.2T/102.4T"
    baseline: "25.6T"
    source: "Arista/博通产品路线图"

# 投资逻辑总结
investment_thesis: |
  基础设施层是AI工厂，从"仓库"变成"产线"。
  核心矛盾：算力需求爆发式增长 vs 物理基础设施建设的线性扩张。
  
  三层机会：
  1. 上游材料：高速PCB/CCL是结构性升级，M9认证周期长
  2. 中游设备：AI服务器整机设计壁垒高，英伟达GB200放量是核心催化剂
  3. 下游运营：云厂商CAPEX是景气度锚点，但电力瓶颈制约实际落地
  
  关键变化：不是简单堆服务器，而是涵盖土地、电力、液冷、网络、建筑的庞大物理系统。
  
  投资特性：工程壁垒极高，头部集中，二三线难以追赶。
