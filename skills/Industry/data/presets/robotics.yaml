name: 机器人产业链
version: "1.0"
industry: robotics
source: 瑞银特斯拉Optimus分析 + 黄仁勋五层蛋糕应用层

# 产业链结构（上游 → 中游 → 下游）
chain:
  upstream:
    name: 上游 · 核心零部件
    segments:
      - name: 减速器
        key_items:
          - 谐波减速器
          - RV减速器
          - 行星减速器
          - 微型减速器
        key_players:
          - "绿的谐波"
          - "双环传动"
          - "日本哈默纳科"
          - "日本纳博特斯克"
        bottleneck: "谐波减速器日本垄断80%+，国产替代初期"
        data_sources: "减速器出货量、国产渗透率"
      - name: 电机/执行器
        key_items:
          - 伺服电机
          - 力矩电机
          - 线性执行器
          - 旋转执行器
        key_players:
          - "三花智控"
          - "拓普集团"
          - "鸣志电器"
          - "汇川技术"
        bottleneck: "人形机器人用执行器需重新设计，无现成标准品"
        data_sources: "执行器送样进度、特斯拉定点公告"
      - name: 传感器
        key_items:
          - 力矩传感器
          - 视觉传感器(摄像头)
          - 激光雷达(LiDAR)
          - IMU惯性测量
        key_players:
          - "奥比中光"
          - "禾赛科技"
          - "速腾聚创"
          - "柯力传感"
        bottleneck: "六维力矩传感器精度要求高，单价贵"
        data_sources: "传感器出货量、精度指标"

  midstream:
    name: 中游 · 本体与控制
    segments:
      - name: 机器人本体
        key_items:
          - 人形机器人
          - 工业机器人(六轴)
          - 协作机器人
          - 服务机器人
        key_players:
          - "特斯拉Optimus"
          - "Figure AI"
          - "优必选"
          - "宇树科技"
          - "智元机器人"
        bottleneck: "本体成本>10万美元，量产需降至2万美元以下"
        data_sources: "本体出货量、成本拆解"
      - name: 控制器/大脑
        key_items:
          - 运动控制器
          - 世界模型(World Model)
          - 端到端神经网络
          - 多模态感知融合
        key_players:
          - "英伟达Isaac"
          - "特斯拉FSD团队"
          - "地平线"
          - "智谱"
        bottleneck: "世界模型是机器人从静态部署到动态控制的关键突破"
        data_sources: "算法迭代进度、实机测试视频"
      - name: 操作系统/中间件
        key_items:
          - ROS2
          - 机器人中间件
          - 仿真平台
          - 数字孪生
        key_players:
          - "Open Robotics"
          - "NVIDIA Omniverse"
          - "西门子等"
        bottleneck: "仿真到实机的gap(Sim-to-Real)"
        data_sources: "仿真平台使用量"

  downstream:
    name: 下游 · 应用场景
    segments:
      - name: 汽车制造
        key_items:
          - 产线搬运
          - 精密装配
          - 质量检测
          - 仓储物流
        key_players:
          - "特斯拉"
          - "宝马"
          - "比亚迪"
          - "富士康"
        bottleneck: "汽车产线对精度/节拍要求极高"
        data_sources: "汽车厂商机器人采购量"
      - name: 物流仓储
        key_items:
          - 分拣机器人
          - AGV/AMR
          - 码垛机器人
          - 无人叉车
        key_players:
          - "极智嘉"
          - "海康机器人"
          - "快仓"
          - "海柔创新"
        bottleneck: "电商增速放缓可能影响仓储自动化投入"
        data_sources: "物流机器人出货量、电商GMV"
      - name: 消费/服务
        key_items:
          - 人形机器人(家庭)
          - 医疗机器人
          - 教育机器人
          - 清洁机器人
        key_players:
          - "优必选(Walker)"
          - "特斯拉(Optimus)"
          - "iRobot"
          - "石头科技"
        bottleneck: "C端价格敏感，需成本降至可接受范围"
        data_sources: "消费机器人销量、均价"

# 关键投资数据锚点
key_metrics:
  - metric: 全球智能机器人硬件市场
    value: "$300亿 (2026E)"
    source: "瑞银/行业研报"
  - metric: 中国具身智能市场
    value: "$110亿 (2026E)"
    growth: "+120% YoY"
    source: "行业研报"
  - metric: 中国人形机器人市场
    value: "$13亿 (2026E)"
    growth: "场景拓展3倍+"
    source: "行业研报"
  - metric: 特斯拉Optimus量产时间表
    value: "2026年中发布→7-8月量产"
    catalyst: "5-6月定点消息"
    source: "特斯拉指引"
  - metric: 人形机器人成本目标
    value: "$2万以下"
    current: ">$10万"
    source: "马斯克目标"
  - metric: 谐波减速器国产化率
    value: "<20%"
    target: "50%+ (2027)"
    source: "绿的谐波/双环传动"

# 投资逻辑总结
investment_thesis: |
  机器人是AI在物理世界的价值兑现，从"能对话"到"能办事"。
  核心矛盾：技术成熟度快速提升 vs 成本控制/量产能力的追赶。
  
  三层机会：
  1. 上游零部件：减速器/执行器是"卖铲人"，日本垄断但国产替代加速
  2. 中游本体：人形机器人量产在即(2026H2)，但成本需降至2万美元以下
  3. 下游应用：汽车/物流是第一批落地场景，C端家庭应用尚需时日
  
  关键催化剂：
  - 2026年5-6月：特斯拉Optimus定点消息
  - 2026年7-8月：量产启动
  - 2027年：成本降至可接受范围
  
  投资特性：上游零部件确定性最高(减速器/执行器)，中游本体弹性最大但波动也大。
  注意：当前市场可能高估了短期落地速度，需警惕"量产跳票"风险。
