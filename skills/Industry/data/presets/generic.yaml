chain_name: generic-manufacturing
industry_name: 通用制造业
tags: [制造业, 通用]

upstream:
  nodes:
    - name: 原材料
      key_players: [原材料供应商]
      key_metrics:
        - 核心原材料价格
        - 原材料库存天数
        - 进口依赖度
      price_benchmark: "待搜索确认"
      shortage_indicator: "待搜索确认"
    - name: 核心设备
      key_players: [设备制造商]
      key_metrics:
        - 设备交货周期
        - 进口替代进度
      shortage_indicator: "待搜索确认"

midstream:
  nodes:
    - name: 制造加工
      key_players: [制造厂商]
      key_metrics:
        - 产能利用率
        - 毛利率
        - 订单 backlog
      price_benchmark: "待财报数据确认"
    - name: 组装测试
      key_players: [组装厂商]
      key_metrics:
        - 交付周期
        - 良品率
      price_benchmark: "待搜索确认"

downstream:
  nodes:
    - name: 终端客户
      key_players: [终端品牌/渠道]
      key_metrics:
        - 终端需求增速
        - 客户集中度
        - 库存周转天数
      demand_indicator: "待搜索确认"

value_allocation:
  upstream_share: 30
  midstream_share: 40
  downstream_share: 30
  bargaining_power: "需根据具体产业链判断"

life_cycle:
  stage: 待判断
  penetration_range: "待判断"
  growth_driver: "待搜索确认"
  risk_factor: "技术替代、政策变化、需求波动"

signal_weights:
  barometric: 1.0
  mid_axis: 1.0
  ebb_warning: 1.0

key_catalysts:
  - "待用户补充或搜索确认"

preset_indicators:
  barometric:
    - indicator: 核心原材料价格
      unit: ""
      trigger: 连续3月环比上涨≥10%
      current: "待搜索"
      source: "网络搜索"
    - indicator: 设备交货周期
      unit: 周
      trigger: 延长≥2倍
      current: "待搜索"
      source: "网络搜索"
    - indicator: 合同负债/预收款
      unit: ""
      trigger: 连续2季环比≥30%
      current: "待财报数据"
      source: "财报数据"

  mid_axis:
    - indicator: 毛利率
      unit: '%'
      trigger: 连续2季环比≥3pp
      current: "待财报数据"
      source: "财报数据"
    - indicator: 产能利用率
      unit: '%'
      trigger: 维持≥90%连续2季
      current: "待搜索"
      source: "网络搜索"
    - indicator: 订单 backlog
      unit: '%'
      trigger: 同比增长≥50%
      current: "待财报数据"
      source: "财报数据"

  ebb_warning:
    - indicator: 下游库存周转天数
      unit: 天
      trigger: 同比上升≥50%
      current: "待搜索"
      source: "网络搜索"
    - indicator: 订单取消率
      unit: '%'
      trigger: ≥10%
      current: "待搜索"
      source: "网络搜索"
    - indicator: 产品价格
      unit: ""
      trigger: 连续2月环比下跌
      current: "待搜索"
      source: "网络搜索"

preset_companies: []
