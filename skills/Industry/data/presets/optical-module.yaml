chain_name: optical-module-communication
industry_name: 光模块/光通信
tags: [光通信, 光模块, 光芯片, AI算力, 数据中心]

upstream:
  nodes:
    - name: 磷化铟衬底
      key_players: [云南锗业, AXT, Sumitomo]
      key_metrics:
        - 2英寸光通信级衬底价格
        - 全球供应量 vs 需求量缺口
        - 扩产进度（鑫耀半导体45万片等）
      price_benchmark: "2英寸衬底 $800→$2500(2026.04)"
      shortage_indicator: "全球缺口200万片+"
    - name: 光芯片（EML/CW/DSP）
      key_players: [Lumentum, Coherent, Marvell, Broadcom, 源杰科技]
      key_metrics:
        - 100G/200G EML价格
        - DSP芯片交货周期
        - 订单能见度（Lumentum锁至2027年+）
      price_benchmark: "100G EML $7→$10, 200G EML $22→$30(2026)"
      shortage_indicator: "Lumentum 2027产能已售罄"
    - name: 硅光晶圆/代工
      key_players: [台积电, GlobalFoundries, Tower]
      key_metrics:
        - 硅光晶圆代工产能利用率
        - 预订排期
      shortage_indicator: "产能预订爆满至2027年"

midstream:
  nodes:
    - name: 光器件/组件
      key_players: [仕佳光子, 天孚通信, 东田微]
      key_metrics:
        - AWG芯片出货量
        - CW光源认证进度
        - 光隔离器市占率
      price_benchmark: "AWG芯片小批量出货，CW光源内部验证通过"
    - name: 光模块整机
      key_players: [中际旭创, 新易盛, 德科立, 光迅科技]
      key_metrics:
        - 800G/1.6T出货量
        - 毛利率
        - 交付周期
        - 云厂商长约签订比例
      price_benchmark: "800G模块价格 $800→$1000, 1.6T $1600→$2000"

downstream:
  nodes:
    - name: 云厂商/数据中心
      key_players: [Google, Amazon, Meta, 字节, 阿里, 腾讯]
      key_metrics:
        - 年度Capex
        - AI服务器部署量
        - 800G/1.6T端口采购计划
      capex_benchmark: "全球Capex $6500亿(2026), 字节4200亿, 阿里腾讯各1500亿"
    - name: AI芯片厂商
      key_players: [英伟达, AMD, 华为, 海光]
      key_metrics:
        - GPU/ASIC出货量
        - 光互联带宽需求
      demand_indicator: "NVDA Rubin架构驱动1.6T需求"

value_allocation:
  upstream_share: 15
  midstream_share: 25
  downstream_share: 60
  bargaining_power: "下游主导（云厂商集中度高），但上游InP衬底卡脖子形成议价权反制"

life_cycle:
  stage: 成长期
  penetration_range: "15-40%"
  growth_driver: "800G→1.6T升级 + 硅光渗透率提升 + AI算力爆发"
  risk_factor: "CPO技术路线可能替代传统可插拔光模块（长期威胁）"

signal_weights:
  barometric: 1.3
  mid_axis: 1.0
  ebb_warning: 0.8

key_catalysts:
  - "NVDA Rubin架构出货节奏"
  - "1.6T光模块量产进度"
  - "Lumentum/Coherent产能释放"
  - "硅光渗透率突破60%"
  - "国内云厂商Capex兑现"

preset_indicators:
  barometric:
    - indicator: InP衬底价格
      unit: USD/片
      trigger: 连续3月环比上涨≥15%
      current: "2300-2500(2026.04)"
      source: "SemiAnalysis + JPMorgan"
    - indicator: EML/CW激光器价格
      unit: USD/颗
      trigger: 涨幅≥20%
      current: "200G EML $22→$30"
      source: "产业链调研"
    - indicator: DSP芯片交货周期
      unit: 周
      trigger: 延长≥2倍
      current: "Marvell DSP紧缺，交货周期翻倍"
      source: "产业链调研"
    - indicator: 光芯片库存天数
      unit: 天
      trigger: 降至≤15天
      current: "<15天"
      source: "产业链调研"
    - indicator: 硅光晶圆代工预订
      unit: 月
      trigger: 预订爆满至次年
      current: "排期至2027年"
      source: "产业链调研"

  mid_axis:
    - indicator: 光模块毛利率
      unit: '%'
      trigger: 连续2季环比≥3pp
      current: "中际旭创Q1毛利率提升"
      source: "财报数据"
    - indicator: 800G/1.6T交付周期
      unit: 周
      trigger: 从8周延至20周+
      current: "12-16周"
      source: "产业链调研"
    - indicator: 产能利用率
      unit: '%'
      trigger: 维持≥90%连续2季
      current: "头部厂商>90%"
      source: "产业链调研"
    - indicator: 云厂商长约签订
      unit: '%'
      trigger: 新客户/订单中长约占比≥30%
      current: "头部厂商长约覆盖率提升"
      source: "产业链调研"
    - indicator: 订单能见度
      unit: 月
      trigger: 延伸至12个月+
      current: "Lumentum/Coherent锁至2027年+"
      source: "公司公告"

  ebb_warning:
    - indicator: 云厂商Capex增速
      unit: '%'
      trigger: 从≥+40%降至≤+10%
      current: "全球仍+35%，但增速或放缓"
      source: "券商预测"
    - indicator: 光模块库存周转天数
      unit: 天
      trigger: 从45天升至90天+
      current: "头部<45天"
      source: "财报数据"
    - indicator: 800G模块价格
      unit: USD
      trigger: 连续2月环比下跌
      current: "价格仍在上行"
      source: "产业链调研"
    - indicator: 硅光替代速度
      unit: '%'
      trigger: 渗透率超预期突破70%
      current: "渗透率~50-55%"
      source: "LightCounting"
    - indicator: 应收账款增速
      unit: '%'
      trigger: 超过营收增速≥20pp
      current: "头部厂商应收增速<营收增速"
      source: "财报数据"

preset_companies:
  - code: "002428.SZ"
    name: 云南锗业
    position: "上游衬底"
    logic: "InP衬底缺货涨价最直接的卖水人"
  - code: "688313.SH"
    name: 仕佳光子
    position: "中游光芯片/器件"
    logic: "AWG/CW光源差异化国产替代路径，光隔离器市占率>50%"
  - code: "300308.SZ"
    name: 中际旭创
    position: "下游光模块整机"
    logic: "全球光模块龙头，800G/1.6T出货量第一"
  - code: "300502.SZ"
    name: 新易盛
    position: "下游光模块整机"
    logic: "800G放量驱动高弹性"
  - code: "688205.SH"
    name: 德科立
    position: "下游光模块+DCI"
    logic: "DCI/相干模块差异化赛道"
