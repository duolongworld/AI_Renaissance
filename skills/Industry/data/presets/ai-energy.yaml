name: AI能源层
version: "1.0"
industry: ai-energy
source: 黄仁勋AI五层蛋糕结构投研报告

# 产业链结构（上游 → 中游 → 下游）
chain:
  upstream:
    name: 上游 · 发电与电网
    segments:
      - name: 发电
        key_items:
          - 小型模块化反应堆(SMR)
          - 燃气发电
          - 风光新能源
        key_players:
          - "CEG(Constellation)"
          - "VST"
          - "阳光电源"
        bottleneck: "核电审批周期长，SMR商业化2028+"
        data_sources: "IEA数据中心用电报告、各公司财报"
      - name: 电网设备
        key_items:
          - 变压器
          - 特高压输电
          - 配电设备
        key_players:
          - "ETN(Eaton)"
          - "思源电气"
          - "伊戈尔"
        bottleneck: "美国变压器交付周期100周+，中国占全球60%产能"
        data_sources: "变压器交期跟踪、电网投资数据"
      - name: 温控/液冷上游
        key_items:
          - 冷却液
          - 热交换器
          - 管路系统
        key_players:
          - "英维克(上游材料供应商)"
          - "三花智控"
        bottleneck: "单机柜功率从10kW→100kW，液冷从可选项变生死线"
        data_sources: "液冷渗透率跟踪、温控设备出货量"

  midstream:
    name: 中游 · 液冷系统与配电
    segments:
      - name: 液冷系统
        key_items:
          - 浸没式液冷
          - 冷板式液冷
          - CDU(冷却分配单元)
        key_players:
          - "英维克"
          - "Vertiv(VRT)"
          - "CoolIT"
        bottleneck: "液冷渗透率2026年预计45%，供应链尚未规模化"
        data_sources: "液冷设备厂商订单、数据中心建设招标"
      - name: 配电与UPS
        key_items:
          - UPS不间断电源
          - PDU配电单元
          - 备用发电机
        key_players:
          - "Eaton"
          - "施耐德"
          - "科华数据"
        bottleneck: "高功率密度下配电冗余要求提升"
        data_sources: "数据中心设备招标、UPS出货量"
      - name: 能源管理
        key_items:
          - 能源管理系统(EMS)
          - 功率监控
          - 热管理AI
        key_players:
          - "施耐德EcoStruxure"
          - "华为数字能源"
        bottleneck: "AI驱动的能源优化算法成熟度"
        data_sources: "能效比PUE数据、数据中心能耗报告"

  downstream:
    name: 下游 · 数据中心运营
    segments:
      - name: 超大规模数据中心
        key_items:
          - 自建/合建数据中心
          - 电力直供协议
          - 绿色能源认证
        key_players:
          - "微软"
          - "谷歌"
          - "亚马逊"
          - "Meta"
        bottleneck: "电力缺口47GW(2025-2028美国)"
        data_sources: "四大云厂商CAPEX指引、数据中心开工数据"
      - name: 第三方数据中心
        key_items:
          - 托管/租赁服务
          - 边缘计算节点
          - 跨境数据中心
        key_players:
          - "Equinix"
          - "Digital Realty"
          - "万国数据"
          - "润泽科技"
        bottleneck: "一线城市能耗指标限制"
        data_sources: "IDC市场规模、上架率数据"
      - name: 算力租赁/云服务
        key_items:
          - GPU云实例
          - 训练/推理集群租赁
          - 私有云部署
        key_players:
          - "协创数据"
          - "CoreWeave"
          - "Lambda Labs"
        bottleneck: "算力供给vs需求缺口"
        data_sources: "GPU租赁价格、算力利用率"

# 关键投资数据锚点
key_metrics:
  - metric: 全球数据中心用电量
    value: "415 TWh (2024)"
    forecast: "945 TWh (2030)"
    source: "IEA"
  - metric: 美国数据中心电力缺口
    value: "47 GW (2025-2028累计)"
    source: "摩根士丹利"
  - metric: 液冷渗透率
    value: "45% (2026E)"
    baseline: "31% (2025)"
    source: "行业研报"
  - metric: 变压器交付周期
    value: "100周+"
    source: "美国供应链跟踪"
  - metric: 单机柜功率密度
    value: "240kW+ (AI集群)"
    baseline: "6-10kW (传统)"
    source: "数据中心设计规范"

# 投资逻辑总结
investment_thesis: |
  电力是AI发展的第一瓶颈，能源层是确定性最高的"卖水人"。
  核心矛盾：AI算力需求指数级增长 vs 电力供给线性扩张的错配。
  三层机会：
  1. 发电端：SMR核电是终极基荷电源，但商业化周期长
  2. 电网端：变压器/配电设备全球紧缺，交付周期100周+
  3. 温控端：液冷从可选项变生死线，渗透率快速提升
  
  时间轴：2026-2027年电力设备紧缺 → 2028-2030年SMR核电逐步上线
  
  投资特性：底层确定性最高，旱涝保收，但增速相对平稳。
